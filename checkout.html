<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمنة - BODY STYLE</title>
    <style>
        :root { --primary: #38bdf8; --success: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .payment-container { background: var(--card); border-radius: 24px; padding: 30px; width: 100%; max-width: 420px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 24px; }
        
        /* شعارات الدفع */
        .methods { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .method { background: white; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; color: #0f172a; border: 1px solid #e2e8f0; display: flex; align-items: center; }
        
        /* صندوق الفاتورة */
        .invoice-box { background: rgba(15, 23, 42, 0.6); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px dashed #475569; }
        .inv-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #94a3b8; }
        .inv-row.total { border-top: 1px solid #334155; margin-top: 15px; padding-top: 15px; color: var(--success); font-weight: bold; font-size: 20px; }
        
        /* المدخلات */
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: var(--bg); color: white; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        
        .promo-flex { display: flex; gap: 10px; }
        .btn-apply { background: var(--primary); color: var(--bg); border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-pay { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-pay:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="payment-container">
        <h2>إتمام الدفع الآمن 🔒</h2>

        <!-- الشعارات -->
        <div class="methods">
            <div class="method" style="border-bottom: 3px solid #0077ff;">mada</div>
            <div class="method" style="border-bottom: 3px solid #1a1f71;">VISA</div>
            <div class="method" style="border-bottom: 3px solid #eb001b;">MasterCard</div>
            <div class="method" style="background: black; color: white;">Apple Pay</div>
        </div>

        <!-- الفاتورة التفصيلية -->
        <div class="invoice-box">
            <div class="inv-row"><span>السعر الأساسي:</span> <span>399.00 ريال</span></div>
            <div class="inv-row"><span>الضريبة (15%):</span> <span>59.85 ريال</span></div>
            <div id="promoRow" class="inv-row" style="display: none; color: #fbbf24;">
                <span>خصم خاص (20%):</span> <span id="promoVal">-0.00 ريال</span>
            </div>
            <div class="inv-row total">
                <span>الإجمالي النهائي:</span> <span id="totalPrice">458.85 ريال</span>
            </div>
        </div>

        <!-- نظام كود الخصم -->
        <div class="field">
            <label>كود الخصم</label>
            <div class="promo-flex">
                <input type="text" id="promoInput" placeholder="أدخل الكود (مثلاً AHMED20)">
                <button class="btn-apply" onclick="applyDiscount()">تطبيق</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 25px;">

        <!-- بيانات البطاقة -->
        <div class="field">
            <label>رقم البطاقة</label>
            <input type="text" id="cardNum" placeholder="0000 0000 0000 0000" maxlength="16">
        </div>

        <div class="grid-2">
            <div class="field">
                <label>تاريخ الانتهاء</label>
                <input type="text" id="expDate" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="field">
                <label>رمز (CVV)</label>
                <input type="password" id="cvv" placeholder="***" maxlength="3">
            </div>
        </div>

        <button class="btn-pay" onclick="handlePayment()">تأكيد الدفع والاشتراك</button>
    </div>

    <script>
        let base = 399.00;
        let tax = 59.85;

        function applyDiscount() {
            const code = document.getElementById('promoInput').value.toUpperCase();
            const promoRow = document.getElementById('promoRow');
            const totalText = document.getElementById('totalPrice');
            const promoVal = document.getElementById('promoVal');

            if (code === "AHMED20") {
                let discount = base * 0.20;
                let newTotal = (base - discount) + ((base - discount) * 0.15);
                
                promoRow.style.display = 'flex';
                promoVal.innerText = "-" + discount.toFixed(2) + " ريال";
                totalText.innerText = newTotal.toFixed(2) + " ريال";
                alert("✅ تم تطبيق خصم 20% بنجاح!");
            } else {
                alert("❌ الكود غير صحيح أو منتهي");
            }
        }

        function handlePayment() {
            const card = document.getElementById('cardNum').value;
            const exp = document.getElementById('expDate').value;
            const cvv = document.getElementById('cvv').value;

            if (card.length < 16 || exp === "" || cvv.length < 3) {
                alert("يرجى إكمال كافة بيانات البطاقة بشكل صحيح");
                return;
            }

            // محاكاة معالجة البنك
            alert("جاري التحقق من البنك... يرجى الانتظار");
            setTimeout(() => {
                alert("✅ تمت العملية بنجاح! شكراً لاشتراكك في BODY STYLE");
                window.location.href = 'mr.html';
            }, 2000);
        }
    </script>
</body>
</html>
