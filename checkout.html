<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الدفع - BODY STYLE</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .payment-card { background: #1e293b; border-radius: 15px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        h2 { color: #38bdf8; text-align: center; margin-top: 0; }
        
        /* ملخص الفاتورة */
        .summary-box { background: #0f172a; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px dashed #334155; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .total-row { border-top: 1px solid #334155; margin-top: 10px; padding-top: 10px; font-weight: bold; color: #22c55e; font-size: 18px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 13px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .promo-section { display: flex; gap: 8px; }
        .apply-btn { background: #38bdf8; color: #0f172a; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .pay-btn { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>ملخص الدفع 💳</h2>

        <!-- ملخص الأسعار -->
        <div class="summary-box">
            <div class="summary-item">
                <span>السعر الأساسي:</span>
                <span><span id="basePrice">399</span> ريال</span>
            </div>
            <div class="summary-item">
                <span>الضريبة (15%):</span>
                <span><span id="taxAmount">59.85</span> ريال</span>
            </div>
            <div id="discountRow" class="summary-item" style="display: none; color: #ef4444;">
                <span>الخصم:</span>
                <span>-<span id="discountValue">0</span> ريال</span>
            </div>
            <div class="summary-item total-row">
                <span>الإجمالي النهائي:</span>
                <span><span id="finalTotal">458.85</span> ريال</span>
            </div>
        </div>

        <!-- كود الخصم -->
        <div class="input-group">
            <label>هل لديك كود خصم؟</label>
            <div class="promo-section">
                <input type="text" id="promoCode" placeholder="مثلاً: AHMED20">
                <button class="apply-btn" onclick="calculatePrice()">تطبيق</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

        <!-- بيانات البطاقة -->
        <div class="input-group">
            <label>رقم البطاقة</label>
            <input type="text" id="cardNum" placeholder="**** **** **** ****" maxlength="16">
        </div>

        <button class="pay-btn" onclick="processPayment()">تأكيد الدفع والاشتراك</button>
    </div>

    <script>
        let originalPrice = 399; // لنفترض أن المستخدم اختار السنوية
        let taxRate = 0.15;

        function calculatePrice() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            let discount = 0;

            if (code === "AHMED20") {
                discount = originalPrice * 0.20; // خصم 20%
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountValue').innerText = discount.toFixed(2);
            } else {
                alert("كود غير صحيح");
                document.getElementById('discountRow').style.display = 'none';
            }

            let priceAfterDiscount = originalPrice - discount;
            let tax = priceAfterDiscount * taxRate;
            let total = priceAfterDiscount + tax;

            document.getElementById('taxAmount').innerText = tax.toFixed(2);
            document.getElementById('finalTotal').innerText = total.toFixed(2);
        }

        function processPayment() {
            if(document.getElementById('cardNum').value.length < 16) {
                alert("يرجى إدخال رقم بطاقة صحيح");
                return;
            }
            alert("تمت معالجة الإجمالي بنجاح! مبروك الاشتراك.");
            window.location.href = 'mr.html';
        }
    </script>
</body>
</html>
