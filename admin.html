<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم BODY STYLE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; margin: 10px; min-width: 200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #5d5dff; color: white; }
        .refresh-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>لوحة تحكم BODY STYLE</h1>
    <p>إدارة مشروع التخرج - الكلية التقنية</p>

    <div class="stat-card">
        <h3>إجمالي المستخدمين</h3>
        <p id="user-count" style="font-size: 24px; font-weight: bold; color: #5d5dff;">جاري التحميل...</p>
    </div>

    <hr>
    <button class="refresh-btn" onclick="loadData()">تحديث البيانات 🔄</button>

    <h2>قائمة المستخدمين المسجلين</h2>
    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الإيميل</th>
            </tr>
        </thead>
        <tbody id="users-list">
            <tr><td colspan="2">جاري سحب البيانات من Supabase...</td></tr>
        </tbody>
    </table>

    <script>
        // الرابط المحدث مع الإصدار v1 لضمان الاتصال
        const SUPABASE_URL = 'https://cgiydhcrkwdjuoajefbj.supabase.co';
        const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnaXlkaGNya3dkanVvYWplZmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTg5NTgsImV4cCI6MjA5MDEzNDk1OH0.zyMYU6cDuWezHvhIJJeRXHgzH5ZQyQFChhNiCvnPHL0';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            try {
                // جلب البيانات من جدول users
                const { data: usersData, count, error } = await supabaseClient
                    .from('users')
                    .select('*', { count: 'exact' });

                if (error) {
                    console.error('Supabase Error:', error);
                    document.getElementById('user-count').innerText = 'خطأ في الاتصال';
                    return;
                }

                document.getElementById('user-count').innerText = count || 0;

                const listBody = document.getElementById('users-list');
                listBody.innerHTML = '';

                if (!usersData || usersData.length === 0) {
                    listBody.innerHTML = '<tr><td colspan="2">لا يوجد مستخدمين حالياً</td></tr>';
                } else {
                    usersData.forEach(user => {
                        listBody.innerHTML += `
                            <tr>
                                <td>${user.username || user.name || 'غير معروف'}</td>
                                <td>${user.email || '-'}</td>
                            </tr>`;
                    });
                }
            } catch (err) {
                console.error('System Error:', err);
                document.getElementById('user-count').innerText = 'خطأ تقني';
            }
        }

        loadData();
    </script>
</body>
</html>
