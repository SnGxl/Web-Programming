<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم BODY STYLE</title>
    <style>
        :root { --p: #7b61ff; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e2d; padding: 20px; border-radius: 15px; border: 1px solid var(--p); }
        .num { font-size: 3rem; color: var(--p); font-bold: true; }
        button { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>لوحة تحكم BODY STYLE</h1>
    <div class="card">
        <h3>المستخدمين المسجلين</h3>
        <span id="count" class="num">0</span><br><br>
        <button onclick="loadData()">تحديث البيانات 🔄</button>
        <p id="msg"></p>
    </div>

    <script>
        const URL = 'https://cgiydhcrkwdjuoajefbj.supabase.co/rest/v1/users?select=*';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnaXlkaGNya3dkanVvYWplZmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTg5NTgsImV4cCI6MjA5MDEzNDk1OH0.zyMYU6cDuWezHvhIJJeRXHgzH5ZQyQFChhNiCvnPHL0';

        async function loadData() {
            const m = document.getElementById('msg');
            m.innerText = "جاري الاتصال...";
            
            // استخدام وكيل (Proxy) لتخطي حماية CORS
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(URL);

            try {
                const response = await fetch(proxyUrl);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                document.getElementById('count').innerText = data.length;
                m.innerText = "تم التحديث بنجاح ✅";
                m.style.color = "#4CAF50";
            } catch (e) {
                m.innerText = "فشل الاتصال.. تأكد من وجود انترنت";
                m.style.color = "#ff4b4b";
            }
        }
        loadData();
    </script>
</body>
</html>
