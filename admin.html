<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم BODY STYLE</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #7c4dff; /* لون بنفسجي متناسق مع شعارك */
            --bg-color: #0f172a; /* خلفية داكنة احترافية */
            --card-bg: #1e293b;
            --text-color: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            padding: 20px; 
            text-align: center; 
            margin: 0;
        }
        h1 { color: var(--primary-color); margin-bottom: 30px; }
        .stat-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            display: inline-block; 
            margin: 20px; 
            min-width: 250px;
            border: 1px solid rgba(124, 77, 255, 0.2);
        }
        table { 
            width: 100%; 
            max-width: 800px;
            margin: 30px auto;
            border-collapse: collapse; 
            background: var(--card-bg); 
            border-radius: 10px;
            overflow: hidden;
        }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background-color: var(--primary-color); color: white; font-weight: bold; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        .refresh-btn { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .refresh-btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>لوحة تحكم BODY STYLE</h1>

    <div class="stat-card">
        <h3>إجمالي المستخدمين</h3>
        <p id="user-count" style="font-size: 32px; font-weight: bold; color: var(--primary-color);">جاري التحميل...</p>
        <button class="refresh-btn" onclick="loadData()">تحديث البيانات 🔄</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>الاسم (Username)</th>
                <th>المعرف (ID)</th>
            </tr>
        </thead>
        <tbody id="users-list">
            <tr><td colspan="2">جاري سحب البيانات من القاعدة...</td></tr>
        </tbody>
    </table>

    <script>
        // الروابط الصحيحة بناءً على بياناتك الأخيرة
        const SUPABASE_URL = 'https://cgiydhcrkwdjuoajefbj.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_nhFw6ucdW0t4_kEptMEkKg_QHONU-_E';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            try {
                // محاولة جلب البيانات من جدول users
                const { data: usersData, count, error } = await supabaseClient
                    .from('users')
                    .select('*', { count: 'exact' });

                if (error) {
                    console.error('Error:', error);
                    document.getElementById('user-count').innerText = 'خطأ في الاتصال';
                    return;
                }

                // تحديث العداد
                document.getElementById('user-count').innerText = count || 0;

                // تحديث الجدول
                const listBody = document.getElementById('users-list');
                listBody.innerHTML = '';

                if (!usersData || usersData.length === 0) {
                    listBody.innerHTML = '<tr><td colspan="2">لا يوجد مستخدمين مسجلين حالياً</td></tr>';
                } else {
                    usersData.forEach(user => {
                        listBody.innerHTML += `
                            <tr>
                                <td>${user.username || 'بدون اسم'}</td>
                                <td>${user.id || '-'}</td>
                            </tr>`;
                    });
                }
            } catch (err) {
                document.getElementById('user-count').innerText = 'خطأ تقني';
            }
        }

        // تشغيل الجلب التلقائي عند فتح الصفحة
        loadData();
    </script>
</body>
</html>
