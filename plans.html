<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باقات الاشتراك - BODY STYLE</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .plans-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            padding: 20px; 
            width: 100%; 
            max-width: 1000px; 
        }
        .plan-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 15px; 
            padding: 25px; 
            width: 280px; 
            text-align: center; 
            transition: transform 0.3s, border-color 0.3s; 
        }
        .plan-card:hover { 
            transform: translateY(-10px); 
            border-color: #38bdf8; 
        }
        .plan-card.pro { 
            border: 2px solid gold; 
            position: relative; 
        }
        .plan-card.pro::after { 
            content: "الأكثر طلباً"; 
            position: absolute; 
            top: -12px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: gold; 
            color: black; 
            padding: 2px 10px; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: bold; 
        }
        h2 { color: #38bdf8; margin-top: 0; }
        .price { font-size: 2rem; font-weight: bold; margin: 15px 0; }
        .features { 
            list-style: none; 
            padding: 0; 
            margin: 20px 0; 
            text-align: right; 
            font-size: 14px; 
        }
        .features li { margin-bottom: 10px; color: #94a3b8; }
        .features li::before { content: "✓ "; color: #22c55e; margin-left: 5px; }
        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-free { background: #334155; color: white; }
        .btn-pro { background: gold; color: black; }
        .back-btn { 
            margin-top: 30px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 14px; 
            border-bottom: 1px solid transparent;
        }
        .back-btn:hover { border-color: #94a3b8; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 40px; text-align: center;">اختر خطة الاشتراك المناسبة</h1>

    <div class="plans-container">
        <div class="plan-card">
            <h2>المجانية</h2>
            <div class="price">0 <span style="font-size: 14px;">ريال</span></div>
            <ul class="features">
                <li>حساب مؤشر كتلة الجسم (BMI)</li>
                <li>حفظ البيانات الأساسية</li>
                <li>نصائح صحية عامة</li>
            </ul>
            <button class="btn-free" onclick="window.location.href='mr.html'">باقتك الحالية</button>
        </div>

        <div class="plan-card pro">
            <h2 style="color: gold;">BODY STYLE PRO</h2>
            <div class="price">49 <span style="font-size: 14px;">ريال/شهر</span></div>
            <ul class="features">
                <li>كل مميزات الباقة المجانية</li>
                <li>خطط تمارين مخصصة لهدفك</li>
                <li>تحليل متقدم للدهون والعضلات</li>
                <li>دعم فني وتواصل مباشر</li>
            </ul>
            <button class="btn-pro" onclick="subscribe()">اشترك الآن 👑</button>
        </div>
    </div>

    <a href="mr.html" class="back-btn">← العودة للمخطط الصحي</a>

    <script>
        function subscribe() {
            alert("شكراً لاختيارك باقة PRO! سيتم نقلك لبوابة الدفع قريباً.");
        }
    </script>

</body>
</html>
