<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Body Style</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        button { width: 100%; padding: 12px; background: #22c55e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #05381d; margin-top: 10px; }
        .toggle { margin-top: 15px; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
        <div class="card">
        <div style="margin-bottom: 20px; text-align: center;">
            <img src="f2d4cd65-e33e-4eb9-a14c-6ecf9932b5e2.jpg" alt="Logo" style="width: 85px; height: 85px; border-radius: 50%; border: 2px solid #38bdf8; object-fit: cover; display: block; margin: 0 auto;">
            <h1 style="font-size: 24px; color: white; margin: 12px 0 5px; font-weight: bold;">BODY STYLE</h1>
            <p style="font-size: 13px; color: #94a3b8; margin: 0;">نظام المخطط الصحي الذكي </p>
        </div>
        
        <h2 style="color: #38bdf8; margin-bottom: 15px;">تسجيل الدخول</h2>
            
    <div class="card">
        <h2>تسجيل الدخول</h2>
        <input type="text" placeholder="اسم المستخدم" id="username">
        <input type="password" placeholder="كلمة المرور" id="password">
        <button onclick="location.href='mr.html'">دخول للمخطط</button>
        <div class="toggle">هذه البيانات مرتبطة بجدول SQL</div>
    </div>
</body>
</html>
