<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - BODY STYLE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-btn { background: #22c55e; }
        .signup-btn { background: #28a745; }
    </style>
</head>
<body>
    <div class="card">
        <img src="f2dcd65-e33e-4eb9-a14c-6ecf9932b5e2.jpg" style="width: 100px; border-radius: 50%;">
        <h1>BODY STYLE</h1>
        <h2>تسجيل الدخول</h2>
        <input type="email" placeholder="البريد الإلكتروني" id="email">
        <input type="password" placeholder="كلمة المرور" id="password">
        <button class="login-btn" onclick="login()">تسجيل الدخول</button>
        <!-- هذا هو الزر اللي يوديك للصفحة الجديدة اللي سميناها signup.html -->
        <button class="signup-btn" onclick="window.location.href='signup.html'">إنشاء حساب جديد</button>
        <div id="message" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
    <script src="login.js"></script>
</body>
</html>
